<!DOCTYPE html>
<html>
<head>
    <title>WebSocket 테스트</title>
</head>
<body>
    <h2>WebSocket 테스트</h2>
    <div>
        <input type="text" id="userId" placeholder="사용자 ID">
        <button onclick="connect()">연결</button>
        <button onclick="disconnect()">연결 해제</button>
    </div>
    <div>
        <h3>수신된 메시지:</h3>
        <pre id="messages" style="height: 300px; overflow-y: scroll; border: 1px solid #ccc;"></pre>
    </div>

    <script>
        let ws;

        function connect() {
            const userId = document.getElementById('userId').value;
            if (!userId) {
                alert('사용자 ID를 입력하세요');
                return;
            }

            ws = new WebSocket('ws://localhost:8080');

            ws.onopen = () => {
                console.log('연결됨');
                // 사용자 등록
                ws.send(JSON.stringify({
                    type: 'REGISTER',
                    userId: userId
                }));
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                const messagesDiv = document.getElementById('messages');
                messagesDiv.innerHTML += `\n[${new Date().toLocaleTimeString()}] ${JSON.stringify(data, null, 2)}`;
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            };

            ws.onclose = () => {
                console.log('연결 해제됨');
            };

            ws.onerror = (error) => {
                console.error('에러:', error);
            };
        }

        function disconnect() {
            if (ws) {
                ws.close();
            }
        }
    </script>
</body>
</html>
